<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Wear | Final Ultimate System</title>
    <style>
        @font-face {
            font-family: 'Persona5Menu';
            src: url('Persona5MenuFontPrototype-Regular.ttf') format('truetype');
        }

        /* ESTILOS BASE */
        body { font-family: 'Arial Black', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* LOGIN */
        #tela-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(45deg, #000 70%, #d10000 70.1%); }
        .login-box { background: #fff; padding: 40px; border: 8px solid #000; transform: rotate(-2deg); box-shadow: 15px 15px 0 #d10000; width: 350px; }
        .login-box h2 { font-family: 'Persona5Menu', sans-serif; text-align: center; background: #d10000; color: #fff; padding: 10px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 3px solid #000; box-sizing: border-box; font-weight: bold; }
        .btn-login { width: 100%; padding: 15px; background: #d10000; color: #fff; border: none; font-weight: 900; cursor: pointer; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); }

        /* HEADER CLIENTE */
        header { background: #d10000; padding: 15px 40px; display: flex; justify-content: space-between; border-bottom: 5px solid #fff; position: sticky; top: 0; z-index: 100; align-items: center; }
        .logo { font-family: 'Persona5Menu', sans-serif; font-size: 28px; background: #000; padding: 5px 15px; border: 2px solid #fff; transform: rotate(-2deg); }
        
        .cart-status { 
            cursor: pointer; background: #fff; color: #000; padding: 10px 25px; font-weight: 900; 
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); 
            transition: 0.3s; transform: skewX(-10deg); border: 2px solid #000;
        }

        /* ADMIN */
        #tela-admin { display: flex; min-height: 100vh; }
        nav { width: 260px; background: #d10000; border-right: 5px solid #fff; position: fixed; height: 100vh; z-index: 10; }
        .admin-logo { font-family: 'Persona5Menu', sans-serif; font-size: 26px; padding: 25px; background: #000; margin: 15px; border: 2px solid #fff; transform: rotate(-3deg); }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.2); text-transform: uppercase; }
        nav li:hover, nav li.active-tab { background: #fff; color: #d10000; font-weight: 900; padding-left: 30px; }
        main.admin-content { flex-grow: 1; padding: 50px; margin-left: 260px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ESTOQUE (+) (-) */
        .btn-qty { background: #fff; border: 2px solid #000; width: 30px; height: 30px; cursor: pointer; font-weight: bold; font-size: 18px; line-height: 1; }
        .btn-qty:hover { background: #d10000; color: #fff; }
        .status-critico { color: #d10000; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        /* TABELAS */
        .table-box { background: #1a1a1a; padding: 25px; border: 3px solid #d10000; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #d10000; border-bottom: 3px solid #fff; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        .order-card { background: #fff; color: #000; margin-bottom: 15px; padding: 15px; border-left: 10px solid #d10000; display: flex; justify-content: space-between; }

        /* VITRINE */
        .vitrine-container { display: flex; padding: 20px; }
        aside li { padding: 15px; cursor: pointer; border-bottom: 1px solid #333; }
        aside li.active-filter { color: #d10000; background: #222; }
        .grid-produtos { flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding-left: 25px; }
        .produto-card { background: #fff; color: #000; padding: 15px; text-align: center; border: 5px solid #000; }
        .produto-card img { width: 100%; height: 200px; object-fit: contain; background: #eee; margin-bottom: 10px; }
        
        .tamanhos-box { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
        .btn-t { border: 2px solid #000; background: #fff; font-size: 11px; cursor: pointer; padding: 5px 8px; font-weight: 900; }
        .btn-t.sel { background: #d10000; color: #fff; border-color: #d10000; }

        .btn-comprar { background: #000; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: 900; clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%); }

        /* CARRINHO */
        #secao-carrinho { display: none; padding: 40px; max-width: 1100px; margin: auto; }
        .carrinho-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; }
        .item-carrinho { display: flex; justify-content: space-between; background: #1a1a1a; padding: 20px; border-left: 8px solid #d10000; margin-bottom: 15px; }
        .resumo-checkout { background: #fff; color: #000; padding: 30px; border: 10px solid #000; transform: rotate(-1deg); box-shadow: 15px 15px 0 #d10000; }
        .input-endereco { width: 100%; padding: 15px; margin: 15px 0; border: 4px solid #000; font-weight: bold; box-sizing: border-box; }

        .notificacao { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #d10000; color: #fff; padding: 20px 50px; border: 4px solid #fff; z-index: 1000; transition: 0.5s; font-family: 'Persona5Menu'; text-align: center; }
        .notificacao.ativo { top: 20px; }
    </style>
</head>
<body>

    <div id="notificacao" class="notificacao">CONEXÃO ESTABELECIDA</div>

    <section id="tela-login">
        <div class="login-box">
            <h2>ACCESSS_SYSTEM</h2>
            <input type="text" id="login-email" placeholder="E-MAIL" value="cliente@gmail.com">
            <input type="password" id="login-senha" placeholder="SENHA" value="123">
            <button class="btn-login" onclick="autenticar()">INFILTRAR-SE</button>
        </div>
    </section>

    <section id="tela-admin" class="hidden">
        <nav>
            <div class="admin-logo">PHANTOM ADMIN</div>
            <ul>
                <li id="li-estoque" class="active-tab" onclick="mudarAba('estoque')">Estoque</li>
                <li id="li-pedidos" onclick="mudarAba('pedidos')">Pedidos</li>
                <li onclick="logout()">Sair</li>
            </ul>
        </nav>
        <main class="admin-content">
            <div id="aba-estoque" class="tab-content active">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h1 style="color:#d10000; font-family:'Persona5Menu'; font-size:35px;">CARGA DE ITENS</h1>
                </div>
                <div class="table-box">
                    <table>
                        <thead><tr><th>Produto</th><th>Categoria</th><th>Quantidade</th><th>Status</th></tr></thead>
                        <tbody id="tabela-admin-corpo"></tbody>
                    </table>
                </div>
            </div>
            <div id="aba-pedidos" class="tab-content">
                <h1 style="color:#d10000; font-family:'Persona5Menu'; font-size:35px;">CONTRATOS ATIVOS</h1>
                <div id="lista-pedidos-admin"></div>
            </div>
        </main>
    </section>

    <section id="tela-cliente" class="hidden">
        <header>
            <div class="logo">PHANTOM WEAR</div>
            <div style="display:flex; gap:25px; align-items:center;">
                <div class="cart-status" onclick="abrirCarrinho()">CARRINHO [ <span id="cart-count">0</span> ]</div>
                <button onclick="logout()" style="background:transparent; color:#fff; border:1px solid #fff; cursor:pointer; padding:5px 10px;">SAIR</button>
            </div>
        </header>

        <div id="vitrine-principal" class="vitrine-container">
            <aside style="width:200px">
                <h3 style="color:#d10000; font-family:'Persona5Menu';">FILTRAR</h3>
                <ul style="list-style:none; padding:0">
                    <li onclick="filtrar('TODOS')" class="active-filter">TODOS</li>
                    <li onclick="filtrar('Camiseta')">CAMISETAS</li>
                    <li onclick="filtrar('Moletom')">MOLETONS</li>
                </ul>
            </aside>
            <main class="grid-produtos" id="vitrine-produtos"></main>
        </div>

        <div id="secao-carrinho">
            <h1 style="font-family:'Persona5Menu'; color:#d10000; font-size:50px;">CHECKOUT</h1>
            <div class="carrinho-grid">
                <div id="itens-carrinho-lista"></div>
                <div class="resumo-checkout">
                    <h2 style="font-family:'Persona5Menu';">RESUMO</h2>
                    <div id="resumo-total" style="font-size:30px; font-weight:900; margin:20px 0;">TOTAL: R$ 0,00</div>
                    <p>ENDEREÇO DE ENTREGA:</p>
                    <textarea id="campo-endereco" class="input-endereco" rows="3"></textarea>
                    <button class="btn-comprar" onclick="finalizarPedido()" style="padding:20px; font-size:20px;">FINALIZAR CONTRATO</button>
                    <p onclick="voltarVitrine()" style="text-decoration:underline; cursor:pointer; text-align:center; margin-top:20px;">VOLTAR</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        // --- CONFIGURAÇÃO RAILWAY ---
        const URL_API = "https://phantomwearapi.onrender.com"; 

        let produtos = [];
        let carrinho = [];
        let selecoesTamanho = {};
        let pedidos = [];

        async function carregarDados() {
            try {
                const res = await fetch(`${URL_API}/produtos`);
                produtos = await res.json();
                
                // Se houver rota de pedidos no C#, carregar também
                const resPed = await fetch(`${URL_API}/pedidos`);
                if(resPed.ok) pedidos = await resPed.json();

                renderVitrine(produtos);
                renderAdmin();
            } catch(e) { console.error("Erro ao conectar com a API Railway"); }
        }

        function autenticar() {
            const email = document.getElementById('login-email').value;
            document.getElementById('tela-login').classList.add('hidden');
            if (email.includes('empresa')) {
                document.getElementById('tela-admin').classList.remove('hidden');
                carregarDados();
            } else {
                document.getElementById('tela-cliente').classList.remove('hidden');
                carregarDados();
            }
        }

        /* ADMIN - SYNC COM RAILWAY */
        function renderAdmin() {
            const tbody = document.getElementById('tabela-admin-corpo');
            if(!tbody) return;
            tbody.innerHTML = produtos.map(p => `
                <tr>
                    <td>${p.nome}</td><td>${p.cat}</td>
                    <td>
                        <button class="btn-qty" onclick="alterarQtd(${p.id},-1)">-</button> 
                        <span style="width:40px; display:inline-block; text-align:center; font-weight:bold;">${p.estoque}</span> 
                        <button class="btn-qty" onclick="alterarQtd(${p.id},1)">+</button>
                    </td>
                    <td class="${p.estoque <= 5 ? 'status-critico' : ''}">${p.estoque <= 5 ? 'CRÍTICO' : 'ESTÁVEL'}</td>
                </tr>
            `).join('');

            const divPed = document.getElementById('lista-pedidos-admin');
            divPed.innerHTML = pedidos.map(p => `
                <div class="order-card">
                    <div><b>#${p.id}</b> - ${p.itens.map(i => i.nome).join(', ')}<br>
                    Destino: <span style="color:#d10000">${p.endereco}</span></div>
                    <div style="text-align:right">R$ ${p.total.toFixed(2)}</div>
                </div>
            `).join('');
        }

        async function alterarQtd(id, d) {
            const p = produtos.find(x => x.id === id);
            const novaQtd = p.estoque + d;
            if(novaQtd < 0) return;

            await fetch(`${URL_API}/produtos/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(novaQtd)
            });
            carregarDados();
        }

        /* VITRINE E CARRINHO */
        function renderVitrine(lista) {
            const v = document.getElementById('vitrine-produtos');
            if(!v) return;
            v.innerHTML = lista.map(p => `
                <div class="produto-card">
                    <img src="${p.img}" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/200x200?text=Produto'">
                    <h4>${p.nome}</h4>
                    <p>R$ ${p.preco.toFixed(2)}</p>
                    <div class="tamanhos-box" id="tams-${p.id}">
                        <button class="btn-t" onclick="setTam(${p.id}, 'P', this)">P</button>
                        <button class="btn-t" onclick="setTam(${p.id}, 'M', this)">M</button>
                        <button class="btn-t" onclick="setTam(${p.id}, 'G', this)">G</button>
                    </div>
                    <button class="btn-comprar" ${p.estoque === 0 ? 'disabled style="background:#555"' : ''} onclick="addCarrinho(${p.id})">
                        ${p.estoque === 0 ? 'ESGOTADO' : 'ADICIONAR'}
                    </button>
                </div>
            `).join('');
        }

        function setTam(id, tam, btn) {
            selecoesTamanho[id] = tam;
            document.getElementById('tams-'+id).querySelectorAll('.btn-t').forEach(b => b.classList.remove('sel'));
            btn.classList.add('sel');
        }

        function addCarrinho(id) {
            if(!selecoesTamanho[id]) { alert("Escolha o tamanho!"); return; }
            const p = produtos.find(x => x.id === id);
            carrinho.push({ ...p, tamanho: selecoesTamanho[id], cartId: Date.now() });
            document.getElementById('cart-count').innerText = carrinho.length;
            mostrarNotificacao("ADICIONADO!");
        }

        async function finalizarPedido() {
            const end = document.getElementById('campo-endereco').value;
            if(!end || carrinho.length === 0) return;

            const pedido = { 
                itens: carrinho, 
                endereco: end, 
                total: carrinho.reduce((a,b)=>a+b.preco,0) 
            };

            const res = await fetch(`${URL_API}/pedidos`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(pedido)
            });

            if(res.ok) {
                carrinho = [];
                document.getElementById('cart-count').innerText = "0";
                mostrarNotificacao("CONTRATO ASSINADO!");
                await carregarDados(); 
                voltarVitrine();
            }
        }

        function abrirCarrinho() {
            document.getElementById('vitrine-principal').style.display = 'none';
            document.getElementById('secao-carrinho').style.display = 'block';
            renderItensCarrinho();
        }

        function renderItensCarrinho() {
            const lista = document.getElementById('itens-carrinho-lista');
            let total = 0;
            lista.innerHTML = carrinho.map((item) => {
                total += item.preco;
                return `
                    <div class="item-carrinho">
                        <div><b>${item.nome}</b> (${item.tamanho})</div>
                        <div>R$ ${item.preco.toFixed(2)}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('resumo-total').innerText = `TOTAL: R$ ${total.toFixed(2)}`;
        }

        function filtrar(cat) {
            const f = cat === 'TODOS' ? produtos : produtos.filter(p => p.cat === cat);
            renderVitrine(f);
        }

        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('aba-' + aba).classList.add('active');
            renderAdmin();
        }

        function voltarVitrine() {
            document.getElementById('vitrine-principal').style.display = 'flex';
            document.getElementById('secao-carrinho').style.display = 'none';
        }

        function mostrarNotificacao(texto) {
            const n = document.getElementById('notificacao');
            n.innerText = texto; n.classList.add('ativo');
            setTimeout(() => n.classList.remove('ativo'), 2000);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
